name: CI

on:
  push:
    branches: ["**"] # run on every branch push
  pull_request:
    branches: [main] # run on PRs targeting main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test] # only build if lint and test pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false # just build, don't push yet
          tags: photo-slideshow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    name: Scan image for vulnerabilities
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          load: true # load into local Docker daemon for Trivy
          tags: photo-slideshow:scan
          cache-from: type=gha

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: photo-slideshow:scan
          format: table
          exit-code: "1" # fail the job if vulnerabilities found
          severity: CRITICAL,HIGH
          ignore-unfixed: true # ignore vulns with no available fix
